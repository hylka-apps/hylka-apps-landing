<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in touch — Hylka Apps</title>
  <meta name="description" content="Have an idea or hit a snag? Tell us — we read everything.">
  <link rel="stylesheet" href="styles.css">
  <script>window.HILKA_PAGE = { active: "contact" };</script>
</head>
<body>
  <div id="site-header"></div>

  <main data-screen-label="Contact">
    <section class="section hero white">
      <div class="wrap center">
        <div class="section-head">
          <span class="eyebrow blue">Get in touch</span>
          <h1 class="h1">We'd love your feedback.</h1>
          <p class="lead mt-32" style="max-width:560px;margin-left:auto;margin-right:auto">Have an idea or hit a snag? Tell us — we read everything.</p>
        </div>
        <div class="btn-row" style="justify-content:center;margin-top:24px">
          <button class="btn btn-secondary btn-sm" data-open-contact>Open as modal ↗</button>
        </div>
      </div>
    </section>

    <section class="section surface" style="padding-top:40px">
      <div class="wrap">
        <div id="pageFormHost"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="i18n.js"></script>
  <script src="site.js"></script>
  <script>
    // render the shared intent-tabs + form into the page, then wire it
    var host = document.getElementById("pageFormHost");
    host.innerHTML = window.HILKA.contactFormHTML("p");
    window.HILKA.wireContactForm(host);
  </script>
</body>
</html>
