<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hylka Apps — Design Variations</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* keep artboard type from inheriting the canvas chrome */
    .vb { font-family: var(--font); color: var(--text); }
    .vb .eyebrow { margin-bottom: 12px; }
    .vb h1 { letter-spacing: .4px; }
    .mini-pill { display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:600;border-radius:100px;padding:11px 20px;font-size:15px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    const AppStore = ({dark}) => (
      <span className="appstore" style={dark ? {} : {}}>
        <svg viewBox="0 0 24 24" fill="#fff" style={{width:22,height:22}}><path d="M16.36 12.78c-.02-2.06 1.68-3.05 1.76-3.1-0.96-1.4-2.45-1.6-2.98-1.62-1.27-.13-2.48.75-3.12.75-.64 0-1.64-.73-2.7-.71-1.39.02-2.67.81-3.38 2.05-1.44 2.5-.37 6.2 1.04 8.23.69.99 1.51 2.1 2.58 2.06 1.04-.04 1.43-.67 2.69-.67 1.25 0 1.61.67 2.7.65 1.12-.02 1.82-1 2.5-2 .79-1.15 1.11-2.26 1.13-2.32-.02-.01-2.17-.83-2.19-3.3zM14.3 6.6c.57-.69.95-1.65.85-2.6-.82.03-1.81.55-2.4 1.23-.53.61-.99 1.58-.86 2.51.91.07 1.84-.46 2.41-1.14z"/></svg>
        <span className="as-txt"><span className="as-small">Download on the</span><span className="as-big">App Store</span></span>
      </span>
    );

    const MiniPhone = ({w=120, grad="linear-gradient(165deg,#0088FF,#7DBEFF)", label="24:00"}) => (
      <div style={{width:w, aspectRatio:"1179/2556", borderRadius:w*0.16, background:"#101010", padding:w*0.04, boxShadow:"0 18px 40px rgba(16,16,16,.22)"}}>
        <div style={{width:"100%",height:"100%",borderRadius:w*0.13,background:grad,display:"grid",placeItems:"center",color:"#fff",fontWeight:800,fontSize:w*0.18}}>{label}</div>
      </div>
    );

    function App() {
      return (
        <DesignCanvas title="Hylka Apps — Design Variations">

          {/* ===================== HERO ===================== */}
          <DCSection id="hero" title="Hero" subtitle="Three takes on the landing hero">

            <DCArtboard id="hero-a" label="A · Centered (current)" width={560} height={460}>
              <div className="vb" style={{padding:"48px 40px", textAlign:"center", background:"#fff", height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"}}>
                <span className="eyebrow green">Indie iOS studio</span>
                <h1 style={{fontSize:42, lineHeight:1.04}}>Small apps, made with care.</h1>
                <p className="lead" style={{maxWidth:380, margin:"16px 0 22px"}}>Focused, beautifully simple iOS apps that do one thing well.</p>
                <div style={{display:"flex",gap:12,justifyContent:"center"}}>
                  <span className="mini-pill" style={{background:"#0088FF",color:"#fff"}}>Explore the App</span>
                  <span className="mini-pill btn-secondary" style={{border:"1px solid #E6E6EA"}}>About us</span>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="hero-b" label="B · Split, left-aligned" width={560} height={460}>
              <div className="vb" style={{padding:"40px", background:"#fff", height:"100%", display:"grid", gridTemplateColumns:"1.2fr .8fr", gap:24, alignItems:"center"}}>
                <div>
                  <span className="eyebrow blue">Indie iOS studio</span>
                  <h1 style={{fontSize:38, lineHeight:1.02}}>Small apps, made with care.</h1>
                  <p className="lead" style={{margin:"14px 0 20px", fontSize:17}}>One thing, done well.</p>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    <span className="mini-pill" style={{background:"#0088FF",color:"#fff"}}>Explore the App</span>
                  </div>
                </div>
                <div style={{display:"grid",placeItems:"center"}}><MiniPhone w={130}/></div>
              </div>
            </DCArtboard>

            <DCArtboard id="hero-c" label="C · Oversized type, no visual" width={560} height={460}>
              <div className="vb" style={{padding:"48px 44px", background:"#F5F5F7", height:"100%", display:"flex", flexDirection:"column", justifyContent:"center"}}>
                <span className="eyebrow coral">Indie iOS studio</span>
                <h1 style={{fontSize:64, lineHeight:.95, letterSpacing:"-.5px"}}>Small apps.<br/>Made with care.</h1>
                <div style={{display:"flex",gap:12,marginTop:26,alignItems:"center"}}>
                  <span className="mini-pill" style={{background:"#0088FF",color:"#fff"}}>Explore the App</span>
                  <span className="textlink" style={{fontWeight:600}}>About us →</span>
                </div>
              </div>
            </DCArtboard>

          </DCSection>

          {/* ===================== APP CARD ===================== */}
          <DCSection id="card" title="App card" subtitle="Variations for the apps-grid card">

            <DCArtboard id="card-a" label="A · Screenshot top (current)" width={340} height={420}>
              <div className="card app-card vb" style={{margin:20, width:300}}>
                <div className="shot" style={{background:"linear-gradient(165deg,#0088FF,#7DBEFF)", aspectRatio:"4/3", position:"relative", display:"grid", placeItems:"center"}}>
                  <span className="badge live" style={{position:"absolute",top:12,left:12}}>Live</span>
                  <div className="app-icon" style={{background:"rgba(255,255,255,.18)", width:64, height:64, fontSize:30}}>⏱️</div>
                </div>
                <div className="body" style={{padding:"18px 20px 20px"}}>
                  <h3 style={{fontSize:22}}>Focusly</h3>
                  <p style={{fontSize:14, color:"var(--muted)", margin:"6px 0 14px"}}>A calm focus timer for deep work.</p>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#0088FF"}}>App Store</span>
                    <span className="textlink" style={{fontSize:14}}>Learn more →</span>
                  </div>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="card-b" label="B · Icon + text row" width={340} height={420}>
              <div className="card vb" style={{margin:20, width:300, padding:24, display:"flex", flexDirection:"column", gap:16}}>
                <div style={{display:"flex",gap:14,alignItems:"center"}}>
                  <div className="app-icon" style={{background:"linear-gradient(150deg,#0088FF,#4DA9FF)", width:60, height:60, fontSize:28, borderRadius:15}}>⏱️</div>
                  <div>
                    <h3 style={{fontSize:21}}>Focusly</h3>
                    <span className="badge live" style={{display:"inline-block",marginTop:4}}>Live</span>
                  </div>
                </div>
                <p style={{fontSize:15, color:"var(--muted)", margin:0, lineHeight:1.5}}>A calm focus timer that turns scattered hours into deep, distraction-free work.</p>
                <div style={{display:"flex",gap:10,marginTop:"auto"}}>
                  <span className="mini-pill" style={{background:"#0088FF",color:"#fff",fontSize:14,padding:"10px 16px",flex:1}}>Get the app</span>
                  <span className="mini-pill" style={{border:"1px solid #E6E6EA",fontSize:14,padding:"10px 16px"}}>Learn more</span>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="card-c" label="C · Full-bleed gradient" width={340} height={420}>
              <div className="card vb" style={{margin:20, width:300, height:360, position:"relative", overflow:"hidden", background:"linear-gradient(165deg,#0088FF,#5AA9FF)", display:"flex", flexDirection:"column", justifyContent:"flex-end"}}>
                <span className="badge" style={{position:"absolute",top:14,left:14,background:"rgba(255,255,255,.92)"}}>Live</span>
                <div className="app-icon" style={{position:"absolute",top:60,left:"50%",transform:"translateX(-50%)",background:"rgba(255,255,255,.2)",width:72,height:72,fontSize:34}}>⏱️</div>
                <div style={{padding:24, background:"linear-gradient(transparent, rgba(0,0,0,.35))", color:"#fff"}}>
                  <h3 style={{fontSize:24, color:"#fff"}}>Focusly</h3>
                  <p style={{fontSize:14, color:"rgba(255,255,255,.9)", margin:"6px 0 14px"}}>A calm focus timer for deep work.</p>
                  <span className="mini-pill" style={{background:"#fff",color:"#0088FF",fontSize:14}}>Learn more →</span>
                </div>
              </div>
            </DCArtboard>

          </DCSection>

          {/* ===================== CLOSING BAND ===================== */}
          <DCSection id="band" title="Closing CTA band" subtitle="Variations for the closing call-to-action">

            <DCArtboard id="band-a" label="A · Blue gradient (current)" width={560} height={300}>
              <div className="vb" style={{padding:20, height:"100%", display:"grid", placeItems:"center", background:"#fff"}}>
                <div className="cta-band accent" style={{width:"100%", padding:"40px 28px"}}>
                  <h2 style={{fontSize:34, color:"#fff"}}>Less noise. More focus.</h2>
                  <p style={{color:"rgba(255,255,255,.9)", margin:"10px 0 22px"}}>Try the app that keeps you in flow.</p>
                  <div style={{display:"flex",justifyContent:"center"}}><span className="appstore" style={{background:"#051a30"}}><AppStore/></span></div>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="band-b" label="B · Soft gray" width={560} height={300}>
              <div className="vb" style={{padding:20, height:"100%", display:"grid", placeItems:"center", background:"#fff"}}>
                <div className="cta-band soft" style={{width:"100%", padding:"40px 28px"}}>
                  <h2 style={{fontSize:34}}>Less noise. More focus.</h2>
                  <p className="lead" style={{margin:"10px 0 22px"}}>Try the app that keeps you in flow.</p>
                  <div style={{display:"flex",justifyContent:"center"}}><AppStore/></div>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="band-c" label="C · Dark band" width={560} height={300}>
              <div className="vb" style={{padding:20, height:"100%", display:"grid", placeItems:"center", background:"#fff"}}>
                <div className="cta-band" style={{width:"100%", padding:"40px 28px", background:"#0D0D0D", color:"#fff"}}>
                  <h2 style={{fontSize:34, color:"#fff"}}>Less noise. More focus.</h2>
                  <p style={{color:"#ABABB0", margin:"10px 0 22px"}}>Try the app that keeps you in flow.</p>
                  <div style={{display:"flex",justifyContent:"center",gap:12}}>
                    <span className="mini-pill" style={{background:"#0088FF",color:"#fff"}}>Download on the App Store</span>
                  </div>
                </div>
              </div>
            </DCArtboard>

          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
